version: "3.9"

services:
  # ── Python FastAPI Backend ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - SCRUTIN_DB_PATH=/data/scrutin.db
    volumes:
      - scrutin_db:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── React / Vite Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - PORT=5173
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  scrutin_db:
    driver: local
